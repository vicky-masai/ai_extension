<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Translator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px; max-height: 520px; overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0c1929; color: #e2e8f0;
    }
    .header {
      padding: 18px; background: linear-gradient(135deg, #0c4a6e, #082f49);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header h1 { font-size: 16px; color: #fff; font-weight: 700; }
    .header p { font-size: 11px; color: #7dd3fc; margin-top: 4px; }
    .body { padding: 16px 18px 18px; }
    label { display: block; font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
    select, input {
      width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 7px; padding: 8px 10px; color: #fff; font-size: 13px; margin-bottom: 14px;
    }
    .glossary-section h3 { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
    .glossary-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .glossary-row input { margin-bottom: 0; flex: 1; font-size: 11px; }
    .glossary-row button {
      background: rgba(239,68,68,0.2); color: #f87171; border: none;
      border-radius: 6px; padding: 0 10px; cursor: pointer; font-size: 14px;
    }
    .btn-add, .btn-save {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 6px;
    }
    .btn-add { background: rgba(255,255,255,0.08); color: #e2e8f0; }
    .btn-save { background: #0284c7; color: #fff; }
    .usage { font-size: 11px; color: #64748b; margin-bottom: 12px; }
    .tips { font-size: 11px; color: #475569; margin-top: 12px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="header">
    <h1>On-Device Translator</h1>
    <p>Legal · Health · Finance — zero cloud charges</p>
  </div>
  <div class="body">
    <div class="usage" id="usage">Loading…</div>
    <label for="target-lang">Target Language</label>
    <select id="target-lang">
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="ja">Japanese</option>
      <option value="pt">Portuguese</option>
      <option value="zh">Chinese</option>
      <option value="ko">Korean</option>
      <option value="it">Italian</option>
      <option value="nl">Dutch</option>
    </select>
    <div class="glossary-section">
      <h3>Custom Glossary (preserve jargon)</h3>
      <div id="glossary-rows"></div>
      <button class="btn-add" id="add-term">+ Add Term</button>
    </div>
    <button class="btn-save" id="save-btn">Save Settings</button>
    <p class="tips">Right-click selected text → Translate, or use "Translate Block" on any page.</p>
    <label for="pro-key" style="margin-top:12px;">Pro Key</label>
    <input type="text" id="pro-key" placeholder="Unlimited translations" />
  </div>
  <script src="popup.js"></script>
</body>
</html>
