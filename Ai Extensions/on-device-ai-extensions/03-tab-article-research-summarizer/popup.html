<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Summarizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px; max-height: 560px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0c1222; color: #e2e8f0; display: flex; flex-direction: column;
    }
    .header {
      padding: 18px 18px 14px;
      background: linear-gradient(135deg, #1e3a5f, #0f172a);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .header p { font-size: 11px; color: #64748b; margin-top: 3px; }
    .usage {
      font-size: 11px; color: #38bdf8; margin-top: 8px;
      background: rgba(56,189,248,0.1); padding: 4px 10px; border-radius: 99px; display: inline-block;
    }
    .actions { padding: 14px 18px; display: flex; gap: 8px; }
    button {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: #0284c7; color: #fff; }
    .btn-primary:hover { background: #0369a1; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #e2e8f0; }
    .btn-secondary:hover { background: rgba(255,255,255,0.14); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .output-wrap { flex: 1; overflow: hidden; padding: 0 18px 18px; display: flex; flex-direction: column; }
    .output-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin-bottom: 6px; }
    #output {
      flex: 1; min-height: 200px; max-height: 340px; overflow-y: auto;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 12px; font-size: 12px; line-height: 1.6;
      white-space: pre-wrap; font-family: 'SF Mono', Menlo, monospace; color: #cbd5e1;
    }
    .status { font-size: 11px; color: #94a3b8; padding: 0 18px 10px; min-height: 16px; }
    .pro-section { padding: 0 18px 14px; }
    .pro-section input {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px; padding: 7px 10px; color: #fff; font-size: 11px; margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Research Summarizer</h1>
    <p>On-device due diligence · Structured Markdown output</p>
    <span class="usage" id="usage">Loading…</span>
  </div>
  <div class="actions">
    <button class="btn-primary" id="summarize-btn">Summarize Tab</button>
    <button class="btn-secondary" id="compare-btn">Compare Top 5 Tabs</button>
  </div>
  <div class="status" id="status"></div>
  <div class="output-wrap">
    <div class="output-label">Output</div>
    <div id="output">Select an action to generate an on-device summary.</div>
  </div>
  <div class="pro-section">
    <label style="font-size:10px;color:#64748b;">Pro Key (unlimited summaries)</label>
    <input type="text" id="pro-key" placeholder="Enter Pro license key" />
  </div>
  <script src="popup.js"></script>
</body>
</html>
